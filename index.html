<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />
  <meta name="theme-color" content="#ff0000" />
  <meta name="description" content="Durova authenticity verification page." />
  <title>Durova | Authenticity Verified</title>
  <style>
    :root {
      --red: #ff0000;
      --red-soft: rgba(255, 0, 0, 0.16);
      --red-glow: rgba(255, 68, 68, 0.4);
      --white: #ffffff;
      --white-06: rgba(255,255,255,.06);
      --white-10: rgba(255,255,255,.10);
      --white-14: rgba(255,255,255,.14);
      --white-18: rgba(255,255,255,.18);
      --white-28: rgba(255,255,255,.28);
      --white-40: rgba(255,255,255,.40);
      --black-soft: rgba(0,0,0,.12);
      --shadow-1: 0 24px 80px rgba(0,0,0,.18);
      --shadow-2: 0 12px 36px rgba(0,0,0,.12);
      --radius-1: 28px;
      --radius-2: 34px;
      --app-height: 100svh;
      --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Helvetica, Arial, sans-serif;
      --serif: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia,
        ui-serif, serif;
    }

    * { box-sizing: border-box; }
    html {
      -webkit-text-size-adjust: 100%;
      background: var(--red);
    }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      background:
        radial-gradient(42rem 32rem at 14% 12%, rgba(255,255,255,.18), transparent 52%),
        radial-gradient(34rem 26rem at 82% 22%, rgba(255,255,255,.10), transparent 58%),
        radial-gradient(40rem 32rem at 50% 100%, rgba(255,255,255,.08), transparent 62%),
        var(--red);
      color: var(--white);
      font-family: var(--sans);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        repeating-linear-gradient(
          to right,
          transparent 0,
          transparent 22px,
          rgba(255,255,255,.035) 23px
        ),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 22px,
          rgba(255,255,255,.035) 23px
        );
      mask-image: radial-gradient(circle at 50% 46%, rgba(0,0,0,.98), rgba(0,0,0,.35) 58%, transparent 88%);
      opacity: .5;
    }

    body::after {
      background:
        linear-gradient(115deg, transparent 0 28%, rgba(255,255,255,.13) 38%, transparent 48% 100%);
      transform: translateX(-42%);
      animation: pageSweep 11s ease-in-out infinite;
      opacity: .6;
      mix-blend-mode: screen;
    }

    img { display: block; max-width: 100%; }

    .stage {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
      min-height: var(--app-height);
      display: grid;
      place-items: center;
      padding:
        calc(env(safe-area-inset-top, 0px) + 18px)
        max(16px, env(safe-area-inset-right, 0px))
        calc(env(safe-area-inset-bottom, 0px) + 18px)
        max(16px, env(safe-area-inset-left, 0px));
    }

    .ambient {
      position: absolute;
      inset: 0;
      overflow: clip;
      pointer-events: none;
    }

    .ambient .orb {
      position: absolute;
      border-radius: 999px;
      filter: blur(10px);
      mix-blend-mode: screen;
      opacity: .5;
    }

    .orb-a {
      width: 46vw;
      height: 46vw;
      min-width: 180px;
      min-height: 180px;
      top: 8%;
      left: -8%;
      background: radial-gradient(circle, rgba(255,255,255,.28), transparent 68%);
      animation: driftA 12s ease-in-out infinite;
    }

    .orb-b {
      width: 56vw;
      height: 56vw;
      min-width: 220px;
      min-height: 220px;
      right: -16%;
      bottom: 6%;
      background: radial-gradient(circle, rgba(255,255,255,.22), transparent 70%);
      animation: driftB 15s ease-in-out infinite;
    }

    .orb-c {
      width: 34vw;
      height: 34vw;
      min-width: 140px;
      min-height: 140px;
      top: 52%;
      left: 8%;
      background: radial-gradient(circle, rgba(255,255,255,.14), transparent 70%);
      animation: driftC 10s ease-in-out infinite;
    }

    .card {
      position: relative;
      width: min(100%, 430px);
      padding: 18px;
      border-radius: var(--radius-2);
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06)),
        linear-gradient(135deg, rgba(255,255,255,.16), transparent 34%),
        rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.28);
      box-shadow: var(--shadow-1);
      backdrop-filter: blur(18px) saturate(135%);
      -webkit-backdrop-filter: blur(18px) saturate(135%);
      overflow: hidden;
      isolation: isolate;
      animation: cardFloat 8.5s ease-in-out infinite;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .card::before {
      background:
        radial-gradient(20rem 9rem at 50% -6%, rgba(255,255,255,.36), transparent 64%),
        linear-gradient(180deg, rgba(255,255,255,.12), transparent 24%);
      opacity: .9;
      z-index: -1;
    }

    .card::after {
      background:
        linear-gradient(115deg, transparent 0 36%, rgba(255,255,255,.16) 44%, transparent 52%);
      transform: translateX(-140%);
      animation: cardSheen 7.8s ease-in-out infinite;
      opacity: .85;
      z-index: 2;
    }

    .frame {
      position: relative;
      border-radius: calc(var(--radius-2) - 8px);
      border: 1px solid rgba(255,255,255,.16);
      background:
        linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      padding: 18px 18px 20px;
      overflow: hidden;
      min-height: min(82svh, 760px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
    }

    .frame::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(255,255,255,.11);
      border-radius: calc(var(--radius-2) - 16px);
      pointer-events: none;
    }

    .frame::after {
      content: "";
      position: absolute;
      inset: auto 18px 18px 18px;
      height: 82px;
      background:
        linear-gradient(180deg, transparent, rgba(255,255,255,.08));
      mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,1));
      pointer-events: none;
      opacity: .65;
    }

    .topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      position: relative;
      z-index: 3;
    }

    .kicker,
    .status-dot {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.09);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .28em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-dot::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 0 0 5px rgba(255,255,255,.12);
      margin-right: 10px;
      flex: 0 0 auto;
      animation: pulseDot 2.8s ease-in-out infinite;
    }

    .brand {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
      padding-top: 4px;
    }

    .logo-shell {
      position: relative;
      width: min(100%, 306px);
      padding: 14px;
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.88));
      border: 1px solid rgba(255,255,255,.7);
      box-shadow: var(--shadow-2);
      overflow: hidden;
      animation: logoLift 6.5s ease-in-out infinite;
    }

    .logo-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(130deg, rgba(255,255,255,0) 0 36%, rgba(255,255,255,.34) 46%, rgba(255,255,255,0) 58% 100%);
      transform: translateX(-160%);
      animation: logoSweep 8s ease-in-out infinite;
    }

    .logo-shell img {
      width: 100%;
      height: auto;
      border-radius: 18px;
      position: relative;
      z-index: 1;
    }

    .hero {
      position: relative;
      z-index: 3;
      display: grid;
      justify-items: center;
      gap: 14px;
      text-align: center;
      padding: 2px 4px 0;
    }

    .title {
      margin: 0;
      font-size: clamp(46px, 16vw, 78px);
      line-height: .88;
      font-weight: 900;
      letter-spacing: -.075em;
      text-transform: uppercase;
      text-wrap: balance;
      color: #fff;
      text-shadow: 0 14px 34px rgba(0,0,0,.14);
    }

    .title .outline {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.3px rgba(255,255,255,.92);
      opacity: .9;
      text-shadow: none;
    }

    .subtitle {
      margin: 0;
      width: min(100%, 23ch);
      font-size: clamp(14px, 3.8vw, 17px);
      line-height: 1.45;
      letter-spacing: .04em;
      color: rgba(255,255,255,.95);
    }

    .auth-module {
      position: relative;
      z-index: 3;
      margin-top: 2px;
      display: grid;
      place-items: center;
      padding: 8px 0 4px;
    }

    .halo-stack {
      position: relative;
      width: min(100%, 250px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
    }

    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.16);
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.06), transparent 62%);
    }

    .ring.r1 {
      inset: 8%;
      animation: spinSlow 18s linear infinite;
    }

    .ring.r2 {
      inset: 18%;
      border-style: dashed;
      border-color: rgba(255,255,255,.28);
      animation: spinReverse 13s linear infinite;
    }

    .ring.r3 {
      inset: 2%;
      border-color: rgba(255,255,255,.09);
      animation: breatheRing 4.8s ease-in-out infinite;
    }

    .ring.r4 {
      inset: 0;
      border-color: rgba(255,255,255,.10);
      transform: scale(.92);
      animation: pulseRing 3.6s ease-out infinite;
    }

    .center-badge {
      position: relative;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.86));
      border: 1px solid rgba(255,255,255,.76);
      box-shadow: 0 16px 44px rgba(0,0,0,.14);
      overflow: hidden;
    }

    .center-badge::before {
      content: "";
      position: absolute;
      inset: -35% 32% -35% -38%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.72), transparent);
      transform: rotate(14deg);
      animation: badgeSweep 4.8s ease-in-out infinite;
    }

    .check {
      position: relative;
      z-index: 1;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid rgba(255,0,0,.14);
      display: grid;
      place-items: center;
      color: var(--red);
      font-size: 30px;
      font-weight: 900;
      box-shadow: inset 0 0 0 8px rgba(255,0,0,.05);
    }

    .status-block {
      position: relative;
      z-index: 3;
      display: grid;
      gap: 8px;
      justify-items: center;
      text-align: center;
      padding-top: 4px;
    }

    .status-eyebrow {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .34em;
      text-transform: uppercase;
      opacity: .86;
    }

    .status-main {
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(30px, 8.8vw, 42px);
      line-height: .96;
      font-weight: 700;
      letter-spacing: -.03em;
    }

    .status-sub {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .26em;
      text-transform: uppercase;
      opacity: .94;
    }

    .micro-line {
      position: relative;
      z-index: 3;
      margin: 2px auto 0;
      width: min(76%, 230px);
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.95), transparent);
    }

    .floor {
      position: absolute;
      inset: auto 0 0 0;
      height: 28%;
      opacity: .44;
      pointer-events: none;
      background:
        radial-gradient(circle, rgba(255,255,255,.72) 0 1.1px, transparent 1.7px);
      background-size: 14px 14px;
      mask-image: linear-gradient(180deg, transparent, rgba(0,0,0,1));
    }

    .scanband {
      position: absolute;
      left: -8%;
      right: -8%;
      top: 48%;
      height: 72px;
      background: linear-gradient(180deg, transparent, rgba(255,255,255,.12), transparent);
      filter: blur(8px);
      transform: translateY(-50%);
      opacity: .54;
      animation: scanBand 5.4s ease-in-out infinite;
      pointer-events: none;
    }

    .noise {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .11;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,.7) .55px, transparent .8px),
        radial-gradient(circle at 80% 40%, rgba(255,255,255,.7) .55px, transparent .8px),
        radial-gradient(circle at 30% 70%, rgba(255,255,255,.7) .55px, transparent .8px),
        radial-gradient(circle at 70% 80%, rgba(255,255,255,.7) .55px, transparent .8px);
      background-size: 22px 22px, 24px 24px, 18px 18px, 26px 26px;
      mix-blend-mode: soft-light;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes pageSweep {
      0%, 100% { transform: translateX(-42%); opacity: .15; }
      50% { transform: translateX(35%); opacity: .58; }
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }
    @keyframes cardSheen {
      0%, 100% { transform: translateX(-140%); opacity: 0; }
      20% { opacity: 0; }
      34% { opacity: .84; }
      54% { transform: translateX(135%); opacity: .58; }
      70% { opacity: 0; }
    }
    @keyframes logoLift {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.008); }
    }
    @keyframes logoSweep {
      0%, 100% { transform: translateX(-160%); opacity: 0; }
      24% { opacity: 0; }
      38% { opacity: 1; }
      56% { transform: translateX(160%); opacity: .6; }
      72% { opacity: 0; }
    }
    @keyframes pulseDot {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,.18); opacity: 1; }
      50% { box-shadow: 0 0 0 7px rgba(255,255,255,0); opacity: .86; }
    }
    @keyframes spinSlow {
      to { transform: rotate(360deg); }
    }
    @keyframes spinReverse {
      to { transform: rotate(-360deg); }
    }
    @keyframes breatheRing {
      0%, 100% { transform: scale(1); opacity: .5; }
      50% { transform: scale(1.03); opacity: .9; }
    }
    @keyframes pulseRing {
      0% { transform: scale(.86); opacity: .65; }
      70% { transform: scale(1.03); opacity: 0; }
      100% { transform: scale(1.03); opacity: 0; }
    }
    @keyframes badgeSweep {
      0%, 100% { transform: translateX(-30%) rotate(14deg); opacity: 0; }
      30% { opacity: 0; }
      40% { opacity: .92; }
      62% { transform: translateX(120%) rotate(14deg); opacity: .52; }
      78% { opacity: 0; }
    }
    @keyframes scanBand {
      0%, 100% { transform: translateY(-72%) scaleX(.96); opacity: .2; }
      45% { opacity: .62; }
      50% { transform: translateY(42%) scaleX(1.02); opacity: .5; }
    }
    @keyframes driftA {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(16px, 14px, 0) scale(1.06); }
    }
    @keyframes driftB {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(-14px, -18px, 0) scale(1.08); }
    }
    @keyframes driftC {
      0%, 100% { transform: translate3d(0,0,0) scale(1); }
      50% { transform: translate3d(10px, -12px, 0) scale(1.05); }
    }

    @media (min-width: 560px) {
      .stage {
        padding:
          calc(env(safe-area-inset-top, 0px) + 24px)
          max(24px, env(safe-area-inset-right, 0px))
          calc(env(safe-area-inset-bottom, 0px) + 24px)
          max(24px, env(safe-area-inset-left, 0px));
      }
      .card { padding: 20px; }
      .frame {
        padding: 22px 22px 24px;
        gap: 20px;
      }
      .logo-shell { width: min(100%, 324px); }
    }

    @media (max-height: 720px) {
      .frame {
        min-height: auto;
        gap: 14px;
      }
      .title { font-size: clamp(42px, 13vw, 68px); }
      .logo-shell { width: min(100%, 268px); }
      .halo-stack { width: min(100%, 220px); }
      .center-badge { width: 104px; height: 104px; }
      .status-main { font-size: clamp(28px, 8vw, 38px); }
    }

    @media (max-width: 360px) {
      .frame {
        padding: 16px 16px 18px;
      }
      .kicker, .status-dot {
        font-size: 9px;
        letter-spacing: .22em;
        padding: 0 11px;
      }
      .status-sub { letter-spacing: .19em; font-size: 11px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .01ms !important;
        scroll-behavior: auto !important;
      }
      body::after, .card::after, .logo-shell::before, .center-badge::before {
        opacity: 0 !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-labelledby="page-title">
    <div class="ambient" aria-hidden="true">
      <div class="orb orb-a"></div>
      <div class="orb orb-b"></div>
      <div class="orb orb-c"></div>
    </div>

    <section class="card" aria-label="Durova authenticity verification">
      <div class="noise" aria-hidden="true"></div>
      <div class="scanband" aria-hidden="true"></div>

      <div class="frame">
        <div class="topline">
          <div class="kicker">Authenticity Check</div>
          <div class="status-dot">Verified</div>
        </div>

        <div class="brand">
